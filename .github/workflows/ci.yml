name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager" (pnpm/action-setup disallows duplicating it here).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build create-templaite CLI
        run: pnpm --filter create-templaite run build

      - name: create-templaite unit tests
        run: pnpm --filter create-templaite test

      - name: Smoke create-templaite (full + minimal)
        run: |
          set -e
          cd /tmp
          rm -rf ct-ci && mkdir ct-ci && cd ct-ci
          node "$GITHUB_WORKSPACE/packages/create-templaite/dist/index.js" --defaults ct-full --skip-install --from "$GITHUB_WORKSPACE"
          node "$GITHUB_WORKSPACE/packages/create-templaite/dist/index.js" --defaults --minimal ct-min --skip-install --from "$GITHUB_WORKSPACE"
          cd ct-full && pnpm install --no-frozen-lockfile
          printf '%s\n' \
            'NEXT_PUBLIC_APP_URL=http://localhost:3000' \
            'DATABASE_URL=postgresql://ci:ci@127.0.0.1:5432/ci' \
            'DIRECT_URL=postgresql://ci:ci@127.0.0.1:5432/ci' \
            'BETTER_AUTH_SECRET=01234567890123456789012345678901' \
            'BETTER_AUTH_URL=http://localhost:3000' > .env
          pnpm exec tsc --noEmit
          cd ../ct-min && pnpm install --no-frozen-lockfile
          printf '%s\n' 'NEXT_PUBLIC_APP_URL=http://localhost:3000' > .env
          pnpm exec tsc --noEmit

      - name: Prisma client
        run: pnpm exec prisma generate

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build
        env:
          # Placeholders so `next build` can evaluate server modules; no DB connection required.
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          BETTER_AUTH_SECRET: "01234567890123456789012345678901"
          BETTER_AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
